version: 2

models:
  - name: fct_trips
    description: >
      Clean trip-grain fact table, one row per valid trip. Reads from
      int_trips_enriched (cleanup already applied). Holds measures and
      foreign keys to dim_stations.
    columns:
      - name: ride_id
        description: Primary key — unique trip identifier.
        tests:
          - unique
          - not_null
      - name: start_station_id
        description: Foreign key to dim_stations (trip origin). Null for dockless starts.
        tests:
          - relationships:
              arguments:
                to: ref('dim_stations')
                field: station_id
      - name: end_station_id
        description: Foreign key to dim_stations (trip destination). Null for dockless ends.
        tests:
          - relationships:
              arguments:
                to: ref('dim_stations')
                field: station_id
      - name: user_type
        description: Rider type — member or casual.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['member', 'casual']
      - name: trip_duration_minutes
        description: Trip length in minutes. Cleaned to the range [1, 120).
        tests:
          - not_null

  - name: dim_stations
    description: >
      Station dimension, one row per unique station. Built from distinct
      start and end stations across all trips, with representative name and
      coordinates.
    columns:
      - name: station_id
        description: Primary key — unique station identifier.
        tests:
          - unique
          - not_null
      - name: station_name
        description: Representative station name.
        tests:
          - not_null
          
  - name: agg_station_demand
    description: >
      Per-station demand model. One row per station, with departures,
      arrivals, station activity, and net flow (arrivals - departures),
      plus daily-average and capacity-normalized variants, and rider-type
      splits. Net flow is the imbalance signal for rebalancing.
    columns:
      - name: station_id
        description: Primary key — unique station identifier.
        tests:
          - unique
          - not_null
      - name: borough
        description: >
          NYC borough this station falls within, assigned via
          point-in-polygon containment against county boundaries. Null
          only in the rare case a station's coordinates fall outside
          all five borough polygons.
      - name: departures
        description: Count of trips starting at this station.
        tests:
          - not_null
      - name: arrivals
        description: Count of trips ending at this station.
        tests:
          - not_null
      - name: total_station_activity
        description: >
          Departures + arrivals at this station (dock-level activity in
          either direction, over the full loaded window). NOT a trip
          count — each trip contributes one departure at its start
          station and one arrival at its end station, so summing this
          column across stations double-counts every trip. Use
          fct_trips for network-wide trip counts. Correct measure for
          station-level capacity/strain, since dock stress comes from
          both departures (bike availability) and arrivals (dock
          availability).
        tests:
          - not_null
      - name: net_flow
        description: >
          Arrivals minus departures. Positive = net destination / net
          accumulation, negative = net origin / net drain.
        tests:
          - not_null
      - name: capacity
        description: Total dock capacity from the GBFS feed. Null for unmatched or inactive stations.
        # no not_null test: capacity is legitimately null for ~11 unmatched/inactive stations
      - name: activity_per_dock
        description: >
          Demand-to-capacity ratio (total_station_activity / capacity).
          Renamed from trips_per_dock: this measures dock-level activity
          (departures + arrivals), NOT a count of distinct trips -- see
          total_station_activity for the double-counting rationale.
          Null where capacity is unknown. Higher = more throughput
          pressure per dock.
      - name: net_flow_per_dock
        description: >
          Net accumulation per dock (net_flow / capacity). Positive = fills
          relative to size, negative = drains. Null where capacity is unknown.
      - name: n_days
        description: >
          Number of distinct trip dates in the currently loaded window.
          Computed dynamically so avg_daily_* metrics stay correct in
          meaning as more months are backfilled. Equals 1 for a
          single-day load, ~30 for one month, etc.
        tests:
          - not_null
      - name: avg_daily_station_activity
        description: >
          total_station_activity divided by n_days — average daily dock
          activity at this station. Preferred over total_station_activity
          for interpretability and for comparability across differently
          sized data windows (e.g. one month vs. several backfilled
          months). Same cross-station summing caveat applies.
        tests:
          - not_null
      - name: avg_daily_net_flow
        description: >
          net_flow divided by n_days — average net bikes gained (positive)
          or lost (negative) per day at this station. The headline
          rebalancing-urgency metric: directly answers "how many bikes a
          day does this station need moved in or out."
        tests:
          - not_null
      - name: avg_daily_activity_per_dock
        description: >
          Daily activity per dock (total_station_activity / capacity /
          n_days). Renamed from avg_daily_trips_per_dock for the same
          reason as activity_per_dock. Computed independently from
          activity_per_dock rather than dividing it, to avoid
          compounding rounding error. Null where capacity is unknown.
      - name: avg_daily_net_flow_per_dock
        description: >
          Daily net accumulation/drain per dock (net_flow / capacity /
          n_days). The recommended metric for flagging stations that
          drain or accumulate too much relative to their size — a
          distribution/threshold analysis on this column is planned for
          the Findings write-up. Null where capacity is unknown.
      - name: avg_daily_net_flow_pct
        description: >
          avg_daily_net_flow_per_dock expressed as a percentage — the
          percent of the station's total capacity gained (positive) or
          lost (negative) per day on average. E.g. 40.0 means the
          station gains bikes equal to 40% of its capacity per day.
      - name: days_to_fill_or_drain
        description: >
          Rough estimate of days for this station to go from empty to
          full (if avg_daily_net_flow is positive) or full to empty (if
          negative), at the station's current average daily net flow
          rate. Unsigned — pair with the sign of avg_daily_net_flow to
          determine direction. Assumes a constant daily rate and no
          rebalancing intervention; an operational estimate, not a
          guaranteed timeline. Null when net flow is ~0 or capacity is
          unknown.
      - name: peak_daily_accumulation
        description: >
          The single largest one-day net_flow (most positive) this
          station experienced in the loaded window — the worst single
          day of filling. Can reveal risk a chronic monthly average
          hides (a station balanced on average may still have had one
          brutal accumulation day).
      - name: peak_daily_drain
        description: >
          The single most negative one-day net_flow this station
          experienced — the worst single day of draining.
      - name: peak_daily_accumulation_per_dock
        description: >
          peak_daily_accumulation relative to capacity. Null where
          capacity is unknown.
      - name: peak_daily_drain_per_dock
        description: >
          peak_daily_drain relative to capacity. Null where capacity is
          unknown.
      - name: max_daily_swing
        description: >
          The single worst (largest) intraday bike-count range observed for
          this station across the observation window, from
          int_station_swing_stats. Diagnostic/reference only — not used in
          Tier 2's chronic swing-ratio metric, since a single worst day
          reflects a peak event rather than a chronic condition.
      - name: avg_daily_swing
        description: >
          Mean intraday bike-count range across all observed days for this
          station, from int_station_swing_stats. Feeds
          avg_daily_swing_to_capacity_pct.
      - name: avg_daily_swing_to_capacity_pct
        description: >
          avg_daily_swing expressed as a percentage of station capacity —
          Tier 2's primary chronic intraday-imbalance metric, structurally
          the one-sided analog of avg_daily_net_flow_pct. Unlike net-flow-pct,
          always >= 0 and can exceed 100% (redistribution-driven arrivals
          beyond a simple drain-then-refill cycle). Null when capacity is
          unknown or the station has no observed activity.

  - name: agg_demand_by_time
    description: >
      Demand by day-of-week, hour, and rider type. One row per
      (day_of_week x trip_hour x is_weekend x user_type) combination.
      Powers time-pattern and member-vs-casual analysis.
    columns:
      - name: trip_count
        description: Number of trips in this time/rider-type slice.
        tests:
          - not_null
      - name: user_type
        description: Rider type — member or casual.
        tests:
          - not_null

  - name: agg_routes
    description: >
      Station-to-station corridors. One row per (start_station, end_station)
      pair, with trip counts and average duration/distance. Includes
      round-trip pairs (start = end).
    columns:
      - name: trip_count
        description: Number of trips on this route.
        tests:
          - not_null
      - name: start_station_id
        description: Route origin station id.
        tests:
          - not_null
      - name: end_station_id
        description: Route destination station id.
        tests:
          - not_null

  - name: agg_daily_trips
    description: >
      Daily trip volume — one row per calendar date. Built as the project's
      vertical-slice model; also used for the daily-volume dashboard view.
      Reads from staging (pre-cleanup), so counts all trips.
    columns:
      - name: trip_date
        description: Calendar date of trips.
        tests:
          - unique
          - not_null
      - name: trip_count
        description: Number of trips on this date.
        tests:
          - not_null