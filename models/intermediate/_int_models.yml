models:
  - name: int_station_id_mapping
    description: >
      Resolves corrupted/duplicate station_ids that share a station_name
      in raw trip data (formatting artifacts like trailing-zero drops or
      appended underscores) down to a single canonical id, using the
      station_info capacity feed as ground truth and a 100m distance
      guard to avoid merging genuinely distinct stations that happen to
      share a name. Grain: one row per distinct station_id seen in trip
      data.
    columns:
      - name: station_id
        description: Raw station_id as it appears in trip data.
        tests:
          - unique
          - not_null

      - name: station_name
        tests:
          - not_null

      - name: canonical_station_id
        description: >
          The id this station_id should be treated as downstream. Equal
          to station_id itself unless this id was identified as a
          corrupted duplicate of another id under the same station_name.
        tests:
          - not_null
  
  - name: int_station_daily_net_flow
    description: >
      Station-day grain net flow (arrivals - departures per station per
      day). Feeds peak_daily_accumulation / peak_daily_drain in
      agg_station_demand.
    columns:
      - name: station_id
        tests:
          - not_null
      - name: trip_date
        tests:
          - not_null
      - name: net_flow
        tests:
          - not_null
  
  - name: int_station_borough
    description: >
      Assigns each station to its NYC borough via point-in-polygon
      containment against official county boundaries. Grain: one row
      per station in dim_stations with non-null coordinates.
    columns:
      - name: station_id
        description: Foreign key to dim_stations.
        tests:
          - unique
          - not_null
      - name: borough
        description: >
          NYC borough the station falls within (Manhattan, Brooklyn,
          Queens, Bronx, or Staten Island). Null only if a station's
          coordinates somehow fall outside all five borough polygons
          (should not occur post-JC/HB-cleanup; investigate if it does).
        tests:
          - not_null
  
  - name: int_station_daily_swing
    description: >
      One row per station-day. Reconstructs each station's intraday bike-count
      trajectory from individual departure/arrival events in int_trips_enriched,
      then computes day_swing — the full range (max minus min) the station's
      cumulative bike count travels through that day, relative to an arbitrary
      zero baseline at day-start. Because the swing is a range, not an absolute
      level, it is independent of the (unknown) actual midnight occupancy. 
      Used as the foundation for intraday imbalance metrics and the donor/recipient safety
      constraints.
    columns:
      - name: station_id
        description: Canonical station identifier (post id-mapping fix).
        tests:
          - not_null
      - name: event_date
        description: Calendar date (station-local) the swing was observed on.
        tests:
          - not_null
      - name: day_swing
        description: >
          MAX(cumulative_net) - MIN(cumulative_net) for the station on this
          date. Always >= 0 by construction. Represents the minimum dock
          capacity required for the station to avoid running empty or full
          at some point during the day, independent of starting occupancy.
        tests:
          - not_null
  
  - name: int_station_swing_stats
    description: >
      One row per station. Aggregates int_station_daily_swing across the full
      observation window into station-level swing statistics: the single
      worst day (max_daily_swing) and the typical day (avg_daily_swing).
      avg_daily_swing feeds agg_station_demand's avg_daily_swing_to_capacity_pct,
      the chronic intraday-imbalance metric. max_daily_swing is
      retained for reference/diagnostic use but is deliberately NOT used as a
      chronic-imbalance trigger, since a single worst day reflects a
      peak event rather than a chronic condition.
    columns:
      - name: station_id
        description: Canonical station identifier (post id-mapping fix).
        tests:
          - not_null
          - unique
      - name: max_daily_swing
        description: >
          The single worst (largest) day_swing observed for this station
          across the observation window. Diagnostic/reference only — not
          used in the chronic swing-ratio metric.
        tests:
          - not_null
      - name: avg_daily_swing
        description: >
          Mean day_swing across all observed days for this station. Feeds
          agg_station_demand.avg_daily_swing_to_capacity_pct.
        tests:
          - not_null
      - name: days_observed
        description: >
          Count of distinct dates with at least one departure/arrival event
          for this station. Sanity-check column to confirm each station has
          a full observation window (~n_days_in_window); not surfaced on the
          dashboard.
        tests:
          - not_null
